name: Build and deploy to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # Завантаження коду
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      # Встановлення Node.js (контроль версії)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24   # ваша команда працює на 24-й, ставимо її тут

      # Збірка проєкту
      - name: Install and build 🔧
        run: |
          npm install
          npm run build

      # Деплой на GitHub Pages
      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: dist
