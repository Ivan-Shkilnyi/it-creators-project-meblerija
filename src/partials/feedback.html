<section class="feedback" id="feedback">
  <div class="container-feedback">
    <h2 class="feedback-title">Відгуки клієнтів</h2>
    <h3 class="feedback-description">
      Дізнайтеся, що кажуть наші задоволені клієнти про нашу меблі.
    </h3>
    <div class="swiper">
      <ul class="swiper-wrapper"></ul>
      <div class="swiper-pagination"></div>
      <div class="btn-wrapper">
        <button class="swiper-button-prev" type="button">
          <svg class="left-btn-icon" width="14" height="14">
            <use href="./img/icons.svg#icon-arrow-left"></use>
          </svg>
        </button>
        <button class="swiper-button-next" type="button">
          <svg class="right-btn-icon" width="14" height="14">
            <use href="./img/icons.svg#icon-arrow-right"></use>
          </svg>
        </button>
      </div>
    </div>
  </div>
</section>
