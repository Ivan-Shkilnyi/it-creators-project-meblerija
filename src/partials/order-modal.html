<section class="order-modal-backdrop is-hidden" data-order-modal>
  <div
    class="order-modal"
    role="dialog"
    aria-modal="true"
    aria-labelledby="order-modal-title"
    tabindex="-1"
  >
    <button
      type="button"
      class="order-modal__close"
      data-order-modal-close
      aria-label="Закрити"
    >
      <span aria-hidden="true">&times;</span>
    </button>

    <h2 class="order-modal__title" id="order-modal-title">Замовити</h2>

    <form class="order-form" data-order-form novalidate>
      <label class="order-form__field" data-order-field="name">
        <span class="order-form__label">Ім'я*</span>
        <input
          type="text"
          name="name"
          id="order-form-name"
          class="order-form__input"
          placeholder="Дмитро"
          autocomplete="name"
          required
          maxlength="30"
          inputmode="text"
          aria-invalid="false"
          aria-describedby="order-form-name-error"
        />
        <span
          class="order-form__error"
          id="order-form-name-error"
          role="alert"
          hidden
        ></span>
      </label>

      <label class="order-form__field" data-order-field="phone">
        <span class="order-form__label">Телефон*</span>
        <input
          type="tel"
          name="phone"
          id="order-form-phone"
          class="order-form__input"
          placeholder="380991232211"
          autocomplete="tel"
          required
          maxlength="12"
          inputmode="numeric"
          aria-invalid="false"
          aria-describedby="order-form-phone-error"
        />
        <span
          class="order-form__error"
          id="order-form-phone-error"
          role="alert"
          hidden
        ></span>
      </label>

      <label class="order-form__field">
        <span class="order-form__label">Коментар</span>
        <textarea
          name="comment"
          class="order-form__textarea"
          placeholder="Введіть ваш коментар"
          rows="4"
          maxlength="1000"
        ></textarea>
      </label>

      <button type="submit" class="btn order-modal__submit">
        Надіслати заявку
      </button>
    </form>
  </div>
</section>
