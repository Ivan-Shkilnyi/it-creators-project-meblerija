<section class="about" id="about">
  <div class="container-about">
    <div class="about__content">
      <h2 class="about__title">Про Меблерію</h2>

      <p class="about__text">
        У Меблерії ми прагнемо створювати затишок та функціональність у кожному
        домі. Наша місія - пропонувати високоякісні меблі, що поєднують у собі
        сучасний дизайн, довговічність та доступність. Ми віримо, що ідеальний
        інтер'єр починається з правильних меблів.
      </p>
    </div>

    <picture class="about__picture">
      <source
        media="(min-width: 1440px)"
        srcset="
          src/img/about/about-desk@1x.webp 1x,
          src/img/about/about-desk@2x.webp 2x
        "
        type="image/webp"
      />

      <source
        media="(min-width: 768px)"
        srcset="
          src/img/about/about-tab@1x.webp 1x,
          src/img/about/about-tab@2x.webp 2x
        "
        type="image/webp"
      />

      <source
        srcset="
          src/img/about/about-mob@1x.webp 1x,
          src/img/about/about-mob@2x.webp 2x
        "
        type="image/webp"
      />

      <img
        src="src/img/about/about-mob@1x.webp"
        alt="Команда обговорює проєкт"
        class="about__image"
        width="335"
        height="250"
        loading="lazy"
      />
    </picture>
  </div>
</section>
